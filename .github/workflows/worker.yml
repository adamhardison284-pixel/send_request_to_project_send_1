name: Supabase Workers (Hourly)

on:
workflow_dispatch:

# schedule:

# - cron: "0 * * * *"

jobs:
run-workers:
runs-on: ubuntu-latest
timeout-minutes: 70

strategy:
  fail-fast: false
  matrix:
    include:
      - worker: 1
        url: https://lezrsmwspvrdahngtvli.supabase.co/functions/v1/PojectSend
      - worker: 2
        url: https://vuudkapcuwtkepeqkpfx.supabase.co/functions/v1/PojectSend
      - worker: 3
        url: https://guypgtlqmsoyjvsspfro.supabase.co/functions/v1/PojectSend
      - worker: 4
        url: https://neighiwqhabqzhakwupe.supabase.co/functions/v1/PojectSend
      - worker: 5
        url: https://gmweskylxvbhhgrcftbo.supabase.co/functions/v1/PojectSend

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install requests
    run: pip install requests

  - name: Run worker
    run: python -u script.py
    env:
      WORKER_ID: worker${{ matrix.worker }}
      URL: ${{ matrix.url }}
```
